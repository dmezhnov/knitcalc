# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

name: knitcalc
description: 'KnitCalc is a calculator for rectangular scarf knitting'

publish_to: none

version: 1.0.7+4

environment:
    sdk: ^3.11.4

homepage: 'https://dmezhnov.github.io/knitcalc/'
repository: 'https://github.com/dmezhnov/knitcalc'
issue_tracker: 'https://github.com/dmezhnov/knitcalc/issues'

dependencies:
    flutter:
        sdk: flutter

    cupertino_icons: ^1.0.8

dev_dependencies:
    flutter_test:
        sdk: flutter

    flutter_lints: ^6.0.0
    icons_launcher: ^3.1.0

icons_launcher:
    android: true
    ios: true
    image_path: 'assets/icon/icon.png'
    platforms:
        android:
            enable: true
        ios:
            enable: true
        macos:
            enable: true
        windows:
            enable: true
        web:
            enable: true
        linux:
            enable: true

flutter:
    uses-material-design: true
