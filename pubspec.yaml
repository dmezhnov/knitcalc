# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

name: knitcalc
description: 'KnitCalc is a knitting calculator'

publish_to: none

version: 1.5.0+18

environment:
    sdk: ^3.11.4

homepage: 'https://dmezhnov.github.io/knitcalc/'
repository: 'https://github.com/dmezhnov/knitcalc'
issue_tracker: 'https://github.com/dmezhnov/knitcalc/issues'

dependencies:
    flutter:
        sdk: flutter

    cupertino_icons: ^1.0.8
    web: ^1.1.1
    path_provider: ^2.1.5

dev_dependencies:
    flutter_test:
        sdk: flutter

    flutter_lints: ^6.0.0
    icons_launcher: ^3.1.0
    # Used by tool/linux_desktop_install.dart to resize the app icon into the
    # Linux bundle's icon-theme PNGs (transitive via icons_launcher; pinned here
    # because the tool imports it directly).
    image: ^4.0.0
    # Test-only: let the desktop update service tests stub getTemporaryDirectory
    # via PathProviderPlatform.instance (already transitive via path_provider).
    path_provider_platform_interface: ^2.1.0
    plugin_platform_interface: ^2.1.0

icons_launcher:
    android: true
    ios: true
    image_path: 'assets/icon/icon.png'
    platforms:
        android:
            enable: true
        ios:
            enable: true
        macos:
            enable: true
        windows:
            enable: true
        web:
            enable: true
        linux:
            enable: true

flutter:
    uses-material-design: true
