# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

name: knitcalc
description: 'KnitCalc is a knitting calculator'

publish_to: none

version: 1.8.33+56

environment:
    sdk: ^3.11.4

homepage: 'https://dmezhnov.github.io/knitcalc/'
repository: 'https://github.com/dmezhnov/knitcalc'
issue_tracker: 'https://github.com/dmezhnov/knitcalc/issues'

dependencies:
    flutter:
        sdk: flutter
    flutter_localizations:
        sdk: flutter

    # Required by the gen-l10n output (AppLocalizations imports package:intl).
    intl: any
    cupertino_icons: ^1.0.8
    web: ^1.1.1
    path_provider: ^2.1.5
    # Cross-platform key/value store (localStorage on web, native prefs/files
    # elsewhere) backing the saved-projects list.
    shared_preferences: ^2.3.0
    # Picks photos to attach to a project. Wraps file_selector on desktop/web and
    # uses the native gallery on mobile; pickMultiImage works on every platform.
    image_picker: ^1.1.2
    # Resizes and re-encodes picked photos before they are base64-stored inline
    # in the project JSON, keeping them small enough for web localStorage.
    image: ^4.0.0
    # Cross-platform HTTP (works on web too, unlike dart:io) for the Firebase
    # Auth/Firestore REST clients that back cloud sync.
    http: ^1.2.0
    # SHA-256 for the PKCE code challenge in the Google OAuth flow.
    crypto: ^3.0.7
    # Opens the system browser for the Google OAuth consent step (the loopback
    # redirect is then caught by our own dart:io HttpServer on desktop).
    url_launcher: ^6.3.2
    # Android-only: native account picker (Credential Manager) for "Sign in with
    # Google". Called strictly behind Platform.isAndroid; other platforms keep
    # the loopback/implicit browser flow. Pulls inert impls on ios/macos/web.
    google_sign_in: ^7.2.0
    # Google Play In-App Updates (flexible flow) for the Play channel: Play
    # reports availability and ships the binary, avoiding store-review lag.
    in_app_update: ^4.2.5
    file_selector: ^1.1.0

dev_dependencies:
    flutter_test:
        sdk: flutter

    flutter_lints: ^6.0.0
    icons_launcher: ^3.1.0
    # Test-only: let the desktop update service tests stub getTemporaryDirectory
    # via PathProviderPlatform.instance (already transitive via path_provider).
    path_provider_platform_interface: ^2.1.0
    plugin_platform_interface: ^2.1.0

icons_launcher:
    android: true
    ios: true
    image_path: 'assets/icon/icon.png'
    platforms:
        android:
            enable: true
        ios:
            enable: true
        macos:
            enable: true
        windows:
            enable: true
        web:
            enable: true
        linux:
            enable: true

flutter:
    uses-material-design: true
    # Generate AppLocalizations from lib/l10n/*.arb (see l10n.yaml).
    generate: true
