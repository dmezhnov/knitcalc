# Configuration for `flutter gen-l10n`.
#
# Translations live in lib/l10n/*.arb (one file per locale). The Russian file is
# the template that defines the message API; AppLocalizations is generated next
# to the .arb files so it can be imported as package:knitcalc/l10n/...
arb-dir: lib/l10n
template-arb-file: app_ru.arb
output-dir: lib/l10n
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
