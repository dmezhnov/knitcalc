# Standalone helper package, kept separate from the Flutter app so it has a
# clean dependency graph (no objective_c/build-hook packages from
# path_provider_foundation) and can be compiled to a single self-contained exe
# with `dart compile exe`. Built into the Windows bundle by `mise build-windows`.
name: knitcalc_updater
description: Standalone Windows/Wine self-update helper for KnitCalc.
publish_to: none
version: 1.0.0

environment:
    sdk: ^3.11.0

dependencies:
    archive: ^4.0.0

dev_dependencies:
    test: ^1.25.0
