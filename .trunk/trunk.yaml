# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
    version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
    sources:
        - id: trunk
          ref: v1.10.0
          uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
    enabled:
        - node@22.16.0
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
    enabled:
        - actionlint@1.7.12
        - dart@3.11.5
        - git-diff-check
        - markdownlint@0.45.0
        - prettier@3.6.2
        - taplo@0.10.0
    ignore:
        - linters: [ALL]
          paths:
              - release/**
              - .dart_tool/**
              - build/**
              - ios/Runner/Assets.xcassets/**
              - macos/Runner/Assets.xcassets/**
              - '**/GeneratedPluginRegistrant.*'
              - '**/generated_plugin_registrant.*'
              - '**/generated_plugins.cmake'
actions:
    disabled:
        - trunk-announce
        - trunk-check-pre-push
        - trunk-fmt-pre-commit
    enabled:
        - trunk-upgrade-available
        - lint-test-pre-commit
    definitions:
        - id: lint-test-pre-commit
          display_name: Pre-commit checks (test branch)
          description: On the test branch, ensures the pubspec version tag is new, then runs `mise lint` and `mise test`; aborts the commit on failure.
          triggers:
              - git_hooks: [pre-commit]
          run: |
              if [ "$(git rev-parse --abbrev-ref HEAD)" != "test" ]; then
                echo "trunk: not on 'test' branch, skipping pre-commit checks"
                exit 0
              fi
              version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
              tag="v${version}"
              if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
                echo "Tag ${tag} already exists on origin. Bump version in pubspec.yaml before committing."
                exit 1
              fi
              mise lint && mise test
