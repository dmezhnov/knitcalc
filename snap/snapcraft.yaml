name: knitcalc
version: 1.0.5
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-knitcalc: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: org.bar.knitcalc # adjust accordingly to your app name

apps:
  knitcalc:
    command: knitcalc
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
    - network
    slots:
      - dbus-knitcalc
parts:
  knitcalc:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart # The main entry-point file of the application
