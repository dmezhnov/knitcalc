# Snap package, published by the `snap-store` job of
# .github/workflows/publish.yml: the job fills {{VERSION}} in and packs the
# release Linux bundle as-is (plugin: dump) — nothing is rebuilt inside
# snapcraft. The job packs with --destructive-mode on a runner whose Ubuntu
# matches `base`, so the bundle's glibc lines up.
name: knitcalc
title: KnitCalc
version: '{{VERSION}}'
summary: KnitCalc is a knitting calculator
description: >
    Gauge conversion, increases/decreases distribution, yarn estimation and
    project notes with photos.
license: MIT
website: https://github.com/dmezhnov/knitcalc
source-code: https://github.com/dmezhnov/knitcalc
issues: https://github.com/dmezhnov/knitcalc/issues

confinement: strict
base: core24
grade: stable

platforms:
    amd64:

apps:
    knitcalc:
        command: knitcalc
        # gnome brings the GTK/Mesa runtime Flutter links against.
        extensions: [gnome]
        plugs:
            - network
            - home

parts:
    knitcalc:
        plugin: dump
        source: build/linux/x64/release/bundle
