name: Publish

on:
  push:
    branches:
      - test

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Test, build, and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: test

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Resolve version
        id: version
        run: |
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag is new
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}"; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists. Bump version in pubspec.yaml before publishing."
            exit 1
          fi

      - name: Run tests
        run: |
          nix develop path:$PWD -c flutter pub get
          nix develop path:$PWD -c flutter analyze
          nix develop path:$PWD -c flutter test

      - name: Build APK
        run: nix develop path:$PWD -c flutter build apk

      - name: Build Android App Bundle
        run: nix develop path:$PWD -c flutter build appbundle

      - name: Build Linux bundle
        run: nix develop path:$PWD -c flutter build linux

      - name: Build web bundle
        run: nix develop path:$PWD -c flutter build web

      - name: Create release folder
        run: |
          rm -rf release
          mkdir -p release/android release/linux release/web
          cp build/app/outputs/flutter-apk/app-release.apk "release/android/knitcalc-${{ steps.version.outputs.version }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "release/android/knitcalc-${{ steps.version.outputs.version }}.aab"
          tar -C build/linux/x64/release/bundle -czf "release/linux/knitcalc-linux-x64-${{ steps.version.outputs.version }}.tar.gz" .
          tar -C build/web -czf "release/web/knitcalc-web-${{ steps.version.outputs.version }}.tar.gz" .

      - name: Commit release files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A release
          git commit -m "Release ${{ steps.version.outputs.tag }}"

      - name: Push main and tag
        run: |
          git push origin HEAD:main
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            release/android/* \
            release/linux/* \
            release/web/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "KnitCalc ${{ steps.version.outputs.version }}" \
            --notes "Automated release for ${{ steps.version.outputs.tag }}"
