name: Publish

on:
    push:
        branches:
            - test

permissions:
    contents: write
    id-token: write
    pages: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
    group: publish
    cancel-in-progress: false

jobs:
    linux-android-web:
        name: Test and build Linux, Android, Web
        runs-on: ubuntu-latest

        outputs:
            version: ${{ steps.version.outputs.version }}
            tag: ${{ steps.version.outputs.tag }}

        steps:
            - name: Checkout test branch
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0
                  ref: test

            - name: Resolve version
              id: version
              run: |
                  version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
                  tag="v${version}"
                  echo "version=${version}" >> "$GITHUB_OUTPUT"
                  echo "tag=${tag}" >> "$GITHUB_OUTPUT"

            - name: Ensure release tag is new
              run: |
                  if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}"; then
                    echo "Tag ${{ steps.version.outputs.tag }} already exists. Bump version in pubspec.yaml before publishing."
                    exit 1
                  fi

            - name: Install mise
              uses: jdx/mise-action@v4

            - name: Install Linux build packages
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev liblzma-dev pkg-config

            - name: Run lint
              run: mise lint

            - name: Run tests
              run: mise test

            - name: Set up Android signing
              env:
                  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
                  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
                  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
              run: |
                  if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
                    echo "::warning::ANDROID_KEYSTORE_BASE64 is not set; the release will use debug keys and won't install over a differently signed build."
                    exit 0
                  fi
                  for var in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
                    if [ -z "${!var}" ]; then
                      echo "::error::$var secret is empty; set all four ANDROID_* secrets (alias is 'knitcalc')."
                      exit 1
                    fi
                  done
                  keystore="$RUNNER_TEMP/knitcalc-release.jks"
                  # Strip any whitespace/newlines a copy-paste may have added.
                  if ! printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$keystore"; then
                    echo "::error::Could not base64-decode ANDROID_KEYSTORE_BASE64. Re-copy the full output of 'base64 -w0 knitcalc-release.jks'."
                    exit 1
                  fi
                  {
                    echo "ANDROID_KEYSTORE_PATH=$keystore"
                    echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
                    echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
                    echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
                  } >> "$GITHUB_ENV"

            - name: Build APK
              run: mise build apk

            - name: Build Android App Bundle
              run: mise build appbundle

            - name: Build Linux bundle
              run: mise build linux

            - name: Build web bundle
              run: mise build web

            - name: Package Linux, Android, Web
              run: |
                  rm -rf release
                  mkdir -p release/android release/linux release/web
                  cp build/app/outputs/flutter-apk/app-release.apk "release/android/knitcalc-${{ steps.version.outputs.version }}.apk"
                  cp build/app/outputs/bundle/release/app-release.aab "release/android/knitcalc-${{ steps.version.outputs.version }}.aab"
                  tar -C build/linux/x64/release/bundle -czf "release/linux/knitcalc-linux-x64-${{ steps.version.outputs.version }}.tar.gz" .
                  tar -C build/web -czf "release/web/knitcalc-web-${{ steps.version.outputs.version }}.tar.gz" .

            - name: Upload Linux, Android, Web artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: release-linux-android-web
                  path: release

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: build/web

    windows:
        name: Build Windows
        runs-on: windows-latest
        needs: linux-android-web

        outputs:
            sha256: ${{ steps.package.outputs.sha256 }}

        steps:
            - name: Checkout test branch
              uses: actions/checkout@v5
              with:
                  ref: test

            - name: Install mise
              uses: jdx/mise-action@v4

            - name: Enable Windows desktop
              run: flutter config --enable-windows-desktop

            - name: Build Windows bundle
              run: mise build windows

            # Exercises the real knitcalc_updater (FFI wait-for-pid + swap +
            # relaunch) on native Windows; the build step already resolved the
            # tool/updater package's dependencies.
            - name: Run updater e2e test
              run: dart test test/updater_e2e_test.dart
              working-directory: tool/updater

            - name: Package Windows bundle
              id: package
              shell: pwsh
              run: |
                  Remove-Item -Recurse -Force release -ErrorAction SilentlyContinue
                  New-Item -ItemType Directory -Force -Path release/windows
                  $zip = "release/windows/knitcalc-windows-x64-${{ needs.linux-android-web.outputs.version }}.zip"
                  Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $zip
                  # The Scoop manifest and winget/Chocolatey submissions pin this hash.
                  $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
                  "sha256=$sha" >> $env:GITHUB_OUTPUT

            - name: Upload Windows artifact
              uses: actions/upload-artifact@v7
              with:
                  name: release-windows
                  path: release

    apple:
        name: Build macOS and iOS
        runs-on: macos-latest
        needs: linux-android-web

        steps:
            - name: Checkout test branch
              uses: actions/checkout@v5
              with:
                  ref: test

            - name: Install mise
              uses: jdx/mise-action@v4

            - name: Enable Apple desktop
              run: flutter config --enable-macos-desktop

            # Exercises the real macOS swap script (ditto extract + full .app
            # replace + open) on a native macOS host — the live-update step we
            # cannot run locally without a Mac.
            - name: Run macOS swap e2e test
              run: flutter test test/update/macos_swap_e2e_test.dart

            - name: Build macOS bundle
              run: mise build macos

            - name: Build unsigned iOS app
              run: mise build ios

            - name: Package Apple bundles
              run: |
                  rm -rf release
                  mkdir -p release/macos release/ios
                  ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/knitcalc.app "release/macos/knitcalc-macos-${{ needs.linux-android-web.outputs.version }}.zip"
                  ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app "release/ios/knitcalc-ios-unsigned-${{ needs.linux-android-web.outputs.version }}.zip"

            - name: Upload Apple artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: release-apple
                  path: release

    publish:
        name: Publish release
        runs-on: ubuntu-latest
        needs:
            - linux-android-web
            - windows
            - apple

        steps:
            - name: Checkout main branch
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0
                  ref: main
                  ssh-key: ${{ secrets.RELEASE_SSH_KEY }}

            - name: Resolve Windows zip URL
              id: windows-zip
              run: |
                  version="${{ needs.linux-android-web.outputs.version }}"
                  echo "url=https://github.com/${GITHUB_REPOSITORY}/releases/download/v${version}/knitcalc-windows-x64-${version}.zip" >> "$GITHUB_OUTPUT"

            - name: Merge test branch
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git merge --no-edit -X theirs origin/test || true
                  # Accept test's side for leftover release/ conflicts (rename/delete or modify/delete).
                  git rm -rf --ignore-unmatch release/
                  if [ -n "$(git ls-files --unmerged)" ]; then
                      echo "Unresolved conflicts outside release/:"
                      git ls-files --unmerged
                      exit 1
                  fi
                  if [ -f .git/MERGE_HEAD ]; then
                      git commit --no-edit
                  fi

            # The repo doubles as the Scoop bucket (`scoop bucket add knitcalc
            # https://github.com/dmezhnov/knitcalc`): each release pins the new
            # version's URL and hash into bucket/knitcalc.json on main, so no
            # separate bucket repo or extra token is needed.
            - name: Render Scoop bucket manifest
              run: |
                  mkdir -p bucket
                  sed -e 's|{{VERSION}}|${{ needs.linux-android-web.outputs.version }}|' \
                      -e 's|{{URL}}|${{ steps.windows-zip.outputs.url }}|' \
                      -e 's|{{SHA256}}|${{ needs.windows.outputs.sha256 }}|' \
                      packaging/scoop/knitcalc.json > bucket/knitcalc.json
                  git add bucket/knitcalc.json
                  git commit -m "Scoop manifest ${{ needs.linux-android-web.outputs.version }}"

            - name: Download release artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: release-*
                  path: release-download
                  merge-multiple: true

            - name: Push main and tag
              run: |
                  git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"
                  git push origin HEAD:main
                  git tag "${{ needs.linux-android-web.outputs.tag }}"
                  git push origin "${{ needs.linux-android-web.outputs.tag }}"

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "${{ needs.linux-android-web.outputs.tag }}" \
                    release-download/*/* \
                    --repo "$GITHUB_REPOSITORY" \
                    --title "KnitCalc ${{ needs.linux-android-web.outputs.version }}" \
                    --notes "Automated release for ${{ needs.linux-android-web.outputs.tag }}"

    windows-package-managers:
        name: Publish to Windows package managers
        runs-on: windows-latest
        needs:
            - linux-android-web
            - windows
            - publish

        steps:
            - name: Checkout test branch
              uses: actions/checkout@v5
              with:
                  ref: test

            # winget and Chocolatey reject +build metadata in versions, so they
            # get the bare semver; the release asset URL keeps the full version.
            - name: Compute package facts
              id: facts
              shell: pwsh
              run: |
                  $full = '${{ needs.linux-android-web.outputs.version }}'
                  $bare = $full.Split('+')[0]
                  $url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/v$full/knitcalc-windows-x64-$full.zip"
                  "full=$full" >> $env:GITHUB_OUTPUT
                  "bare=$bare" >> $env:GITHUB_OUTPUT
                  "url=$url" >> $env:GITHUB_OUTPUT
                  "sha256=${{ needs.windows.outputs.sha256 }}" >> $env:GITHUB_OUTPUT

            # The first version has to be submitted by hand (wingetcreate update
            # only works for packages already in winget-pkgs); see
            # packaging/README.md. Failures are downgraded to warnings so a
            # missing first submission doesn't redden the release.
            - name: Submit to winget-pkgs
              shell: pwsh
              env:
                  PACKAGING_GITHUB_TOKEN: ${{ secrets.PACKAGING_GITHUB_TOKEN }}
              run: |
                  if (-not $env:PACKAGING_GITHUB_TOKEN) {
                    Write-Host "::warning::PACKAGING_GITHUB_TOKEN is not set; skipping the winget submission."
                    exit 0
                  }
                  Invoke-WebRequest -Uri 'https://aka.ms/wingetcreate/latest' -OutFile wingetcreate.exe
                  ./wingetcreate.exe update Dmezhnov.KnitCalc `
                    --version '${{ steps.facts.outputs.bare }}' `
                    --urls '${{ steps.facts.outputs.url }}' `
                    --submit --token $env:PACKAGING_GITHUB_TOKEN
                  if ($LASTEXITCODE -ne 0) {
                    Write-Host "::warning::wingetcreate failed — either Dmezhnov.KnitCalc is not in winget-pkgs yet (first submission is manual) or the token was rejected."
                    exit 0
                  }

            - name: Push to Chocolatey
              shell: pwsh
              env:
                  CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
              run: |
                  if (-not $env:CHOCO_API_KEY) {
                    Write-Host "::warning::CHOCO_API_KEY is not set; skipping the Chocolatey push."
                    exit 0
                  }
                  $pkg = 'packaging/chocolatey'
                  (Get-Content "$pkg/knitcalc.nuspec") `
                    -replace '\{\{VERSION\}\}', '${{ steps.facts.outputs.bare }}' |
                    Set-Content "$pkg/knitcalc.nuspec"
                  (Get-Content "$pkg/tools/chocolateyinstall.ps1") `
                    -replace '\{\{URL\}\}', '${{ steps.facts.outputs.url }}' `
                    -replace '\{\{SHA256\}\}', '${{ steps.facts.outputs.sha256 }}' |
                    Set-Content "$pkg/tools/chocolateyinstall.ps1"
                  choco pack "$pkg/knitcalc.nuspec" --outputdirectory $pkg
                  choco push "$pkg/knitcalc.${{ steps.facts.outputs.bare }}.nupkg" --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY

    deploy-pages:
        name: Deploy GitHub Pages
        runs-on: ubuntu-latest
        needs:
            - publish

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
