# Input manifest for flatpak-flutter (https://github.com/TheAppgineer/flatpak-flutter):
# the tool replaces the flutter git source with an offline SDK module and appends
# pubspec-sources.json generated from pubspec.lock, producing the offline manifest
# (io.github.dmezhnov.knitcalc.yml) that Flathub builds without network access.
# The generated files live in the Flathub packaging repo; regenerate them after
# a release by bumping tag/commit here and running flatpak-flutter (see
# packaging/README.md). The flutter tag must match `flutter` in mise.toml.
id: io.github.dmezhnov.knitcalc
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
    - org.freedesktop.Sdk.Extension.llvm20
command: knitcalc
separate-locales: false
finish-args:
    - --share=network
    - --share=ipc
    - --socket=fallback-x11
    - --socket=wayland
    - --device=dri
modules:
    - name: knitcalc
      buildsystem: simple
      build-options:
          arch:
              x86_64:
                  env:
                      BUNDLE_PATH: build/linux/x64/release/bundle
              aarch64:
                  env:
                      BUNDLE_PATH: build/linux/arm64/release/bundle
          append-path: /usr/lib/sdk/llvm20/bin:/run/build/knitcalc/flutter/bin
          prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
          env:
              PUB_CACHE: /run/build/knitcalc/.pub-cache
      build-commands:
          - flutter build linux --release --no-pub
          - install -D $BUNDLE_PATH/knitcalc /app/bin/knitcalc
          - cp -r $BUNDLE_PATH/lib /app/bin/lib
          - cp -r $BUNDLE_PATH/data /app/bin/data
          - install -Dm644 packaging/flatpak/io.github.dmezhnov.knitcalc.png
            /app/share/icons/hicolor/256x256/apps/io.github.dmezhnov.knitcalc.png
          - install -Dm644 packaging/flatpak/io.github.dmezhnov.knitcalc.desktop
            -t /app/share/applications
          - install -Dm644 packaging/flatpak/io.github.dmezhnov.knitcalc.metainfo.xml
            -t /app/share/metainfo
          - install -Dm644 LICENSE
            /app/share/licenses/io.github.dmezhnov.knitcalc/LICENSE
      sources:
          - type: git
            url: https://github.com/dmezhnov/knitcalc.git
            tag: v1.8.26+49
            commit: a57f404e28f572102edda68bda2f1bb6e8dd9224
          - type: git
            url: https://github.com/flutter/flutter.git
            tag: 3.41.9
            dest: flutter
