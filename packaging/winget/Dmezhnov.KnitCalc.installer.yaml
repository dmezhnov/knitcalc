# {{VERSION}} is the bare semver; {{URL}}/{{SHA256}} point at the
# knitcalc-setup-x64-<full version>.exe GitHub release asset (the Inno Setup
# installer). It installs per-user under %LOCALAPPDATA%\Programs\KnitCalc, so the
# app's DLLs sit next to knitcalc.exe and resolve — the old portable package
# aliased knitcalc.exe via a symlink whose directory had no DLLs, which broke the
# launch. The installer also lets the app self-update by running the new setup.exe
# (see lib/update/impl/windows/windows_update_service_io.dart). ProductCode
# matches Inno's Add/Remove Programs entry so winget tracks upgrades.
PackageIdentifier: Dmezhnov.KnitCalc
PackageVersion: '{{VERSION}}'
Platform:
    - Windows.Desktop
MinimumOSVersion: 10.0.17763.0
InstallerType: inno
Scope: user
InstallerSwitches:
    Silent: /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
    SilentWithProgress: /SILENT /SUPPRESSMSGBOXES /NORESTART
ProductCode: '{3E2280E5-0275-4912-A2FF-CB4B7F32C007}_is1'
Installers:
    - Architecture: x64
      InstallerUrl: '{{URL}}'
      InstallerSha256: '{{SHA256}}'
ManifestType: installer
ManifestVersion: 1.6.0
