# {{VERSION}} is the bare semver; {{URL}}/{{SHA256}} point at the
# knitcalc-windows-x64-<full version>.zip GitHub release asset. The zip is
# installed as a portable package: winget extracts the whole bundle under
# WinGet\Packages\ (which is how the app detects the winget channel) and
# aliases knitcalc.exe.
PackageIdentifier: Dmezhnov.KnitCalc
PackageVersion: '{{VERSION}}'
Platform:
    - Windows.Desktop
MinimumOSVersion: 10.0.17763.0
InstallerType: zip
NestedInstallerType: portable
NestedInstallerFiles:
    - RelativeFilePath: knitcalc.exe
      PortableCommandAlias: knitcalc
Installers:
    - Architecture: x64
      InstallerUrl: '{{URL}}'
      InstallerSha256: '{{SHA256}}'
ManifestType: installer
ManifestVersion: 1.6.0
