[settings]
windows_shim_mode = "symlink"
yes = true
experimental = true
auto_install = true
exec_auto_install = true
not_found_auto_install = true
task_run_auto_install = true
lockfile = true
all_compile = false

[settings.status]
missing_tools = "always"

[plugins]
android-sdk = "https://github.com/mise-plugins/mise-android-sdk"

[tools]
flutter = "3.41.9"
yq = { version = "4.53.2", os = ["linux"] }
java = { version = "17.0.2", os = ["linux"] }
clang = { version = "18.1.8", os = ["linux"] }
cmake = "4.3.3"
ninja = "1.13.2"
firebase = "15.19.1"
trunk = "1.3.4"

[tools.android-sdk]
version = "20.0"
depends = ["yq", "java", "flutter"]
os = ["linux"]
postinstall = """
    yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses
    yes | sdkmanager --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-36" "build-tools;35.0.0" "ndk;28.2.13676358"
    mise exec flutter -- flutter config --android-sdk "$ANDROID_HOME"
    mise exec flutter -- flutter doctor -v
"""

[hooks]
# tool/updater is a separate package (standalone updater helper); resolve it too
# so `mise lint` (trunk's dart analyze) can see its imports in CI, where no prior
# pub get has run for it. Keep this a single shell string, not an array: newer
# mise mis-parses the array form (it ran `trunk install flutter pub get`), so the
# pub-get commands silently never run and the CI lint sees undefined symbols.
postinstall = "flutter pub get && dart pub get -C tool/updater && trunk install"

[tasks.install]
run = "mise i"

[tasks.build]
description = "Build a target platform"
usage = '''
arg "<target>" help="Build target" {
  choices "apk" "appbundle" "web" "linux" "windows" "macos" "ios"
}
'''
# packaging_icons regenerates the repo-resident catalog icons (fastlane,
# flatpak) from the same source, so swapping assets/icon/icon.png updates
# every channel without manual steps.
run = [
    "dart run icons_launcher:create",
    "dart run tool/packaging_icons.dart",
    "mise build-{{ usage.target }}",
]

[tasks.build-apk]
hide = true
run = '''
# Bake the pubspec version so the installed APK can compare itself against the
# latest GitHub release (see lib/update/current_version.dart).
app_version="$(yq -r '.version' pubspec.yaml)"
flutter build apk --dart-define=APP_VERSION="$app_version"
'''

[tasks.build-apk-split]
hide = true
run = '''
# Per-ABI APKs stay under IzzyOnDroid's ~30 MB per-file limit (the fat APK
# does not); the release publishes them alongside the universal APK.
app_version="$(yq -r '.version' pubspec.yaml)"
flutter build apk --split-per-abi --dart-define=APP_VERSION="$app_version"
'''

[tasks.build-appbundle]
hide = true
run = '''
app_version="$(yq -r '.version' pubspec.yaml)"
flutter build appbundle --dart-define=APP_VERSION="$app_version"
'''

[tasks.build-web]
hide = true
run = '''
# Bake the pubspec version into the build so the running app can compare itself
# against the deployed version.json (see lib/update/current_version.dart).
app_version="$(yq -r '.version' pubspec.yaml)"
flutter build web --base-href /knitcalc/ --dart-define=APP_VERSION="$app_version"
'''

[tasks.build-linux]
hide = true
run = '''
# Bake the pubspec version so the installed bundle can compare itself against the
# latest GitHub release (see lib/update/current_version.dart). Without this the
# Linux self-updater never detects an update (currentAppVersion() stays null).
app_version="$(yq -r '.version' pubspec.yaml)"

# Flutter's Linux build hardcodes CC=clang/CXX=clang++ and links the GTK stack
# via pkg-config, none of which NixOS exposes on PATH by default. On NixOS,
# build inside an ad-hoc nix-shell that provides the toolchain; other distros
# (including CI) use their own system toolchain directly.
if [ -e /etc/NIXOS ] && command -v nix-shell >/dev/null 2>&1; then
  nix-shell -p clang pkg-config gtk3 fontconfig libepoxy pcre2 libsysprof-capture util-linux \
    --run '
      # nix-shell exposes each package as -L<dir> on NIX_LDFLAGS. GNU ld resolves
      # the engine transitive deps (libepoxy, libfontconfig) via -rpath-link, not
      # -L, and the built bundle needs them on LD_LIBRARY_PATH to launch.
      libdirs=
      for f in $NIX_LDFLAGS; do
        case $f in -L*) libdirs=${libdirs:+$libdirs:}${f#-L} ;; esac
      done
      export NIX_LDFLAGS="$NIX_LDFLAGS -rpath-link $libdirs"
      export LD_LIBRARY_PATH=$libdirs${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
      flutter build linux --dart-define=APP_VERSION="'"$app_version"'"
    '
else
  flutter build linux --dart-define=APP_VERSION="$app_version"
fi

# Add desktop integration (icon-theme PNGs, .desktop launcher, install.sh) to
# the bundle; icons_launcher only emits snap assets, so a plain tarball install
# would otherwise have no taskbar icon or menu entry. The packaging step tars
# the whole bundle, so these ship in the release automatically.
dart run tool/linux_desktop_install.dart
'''

[tasks.build-windows]
hide = true
# Bake --dart-define=APP_VERSION so the installed bundle can compare itself
# against the latest GitHub release (see lib/update/current_version.dart);
# without it the Windows self-updater never detects an update. This task only
# runs on Windows (CI), so force pwsh and read the version with a native
# PowerShell regex (yq is linux-only). It must NOT nest `powershell -Command
# "..."`: mise's outer pwsh would variable-expand the double-quoted string and
# corrupt it. The explicit $LASTEXITCODE checks keep a failed step from being
# reported as success. The updater helper is compiled into the bundle so the
# self-update can swap files after the app exits (see the tool/updater package);
# the packaging step zips the whole Release dir, so it ships automatically.
shell = 'pwsh -NoProfile -Command'
run = '''
$v = [regex]::Match((Get-Content -Raw pubspec.yaml), '(?m)^version:\s*(.+?)\s*$').Groups[1].Value
flutter build windows --dart-define=APP_VERSION=$v
if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
dart pub get -C tool/updater
if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
dart compile exe tool/updater/bin/knitcalc_updater.dart -o build/windows/x64/runner/Release/knitcalc_updater.exe
if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
'''

[tasks.build-macos]
hide = true
run = '''
# Bake the pubspec version so the installed .app can compare itself against the
# latest GitHub release (see lib/update/current_version.dart). Without this the
# macOS self-updater never detects an update (currentAppVersion() stays null).
# yq is linux-only and this task only runs on the macOS CI runner, so read the
# version with awk (matching the publish workflow's version-resolve step).
app_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
flutter build macos --dart-define=APP_VERSION="$app_version"
'''

[tasks.build-ios]
hide = true
run = "flutter build ios --release --no-codesign"

[tasks.test]
run = ["flutter test", "mise run test-updater"]

# Tests for the standalone updater helper package (separate dependency graph),
# run via plain `dart test` since it has no Flutter dependency.
[tasks.test-updater]
hide = true
dir = "tool/updater"
run = ["dart pub get", "dart test"]

[tasks.dev]
run = "mise run dev-{{ os() }}"

[tasks.dev-linux]
hide = true
run = '''
# Flutter's GTK embedder prints harmless noise we filter out of its output:
#   "Atk-CRITICAL **: atk_socket_embed: assertion 'plug_id != NULL' failed"
#     — upstream engine a11y bug; fires once at startup. NO a11y env var
#       suppresses it (tested NO_AT_BRIDGE=1 and GTK_A11Y=none, both no-ops).
#   "Gdk-WARNING **: Error converting selection from UTF8_STRING"
#     — GTK clipboard/PRIMARY-selection conversion warning; can flood by the
#       hundreds while interacting with a text field. Engine-level (GdkClipboard),
#       not fixable from Dart, and harmless.
# The only way to hide them is to filter those lines out of flutter's output.
# flutter forwards the app's stderr onto its OWN stdout (interleaved with the
# interactive UI), so we run flutter under a pty (util-linux `script`) — which
# keeps colours and the hot-reload key UI working — and grep the lines away.
# `script -e` propagates flutter's exit code; stdin is forwarded so r/R/q work.

# Same NixOS toolchain workaround as build-linux; LD_LIBRARY_PATH also lets the
# launched app find the GTK stack at run time.
if [ -e /etc/NIXOS ] && command -v nix-shell >/dev/null 2>&1; then
  exec nix-shell -p clang pkg-config gtk3 fontconfig libepoxy pcre2 libsysprof-capture util-linux \
    --run '
      libdirs=
      for f in $NIX_LDFLAGS; do
        case $f in -L*) libdirs=${libdirs:+$libdirs:}${f#-L} ;; esac
      done
      export NIX_LDFLAGS="$NIX_LDFLAGS -rpath-link $libdirs"
      export LD_LIBRARY_PATH=$libdirs${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
      script -qefc "flutter run" /dev/null | grep --line-buffered -vE "atk_socket_embed|Error converting selection from UTF8_STRING"
    '
fi

script -qefc "flutter run" /dev/null | grep --line-buffered -vE "atk_socket_embed|Error converting selection from UTF8_STRING"
'''

[tasks.dev-macos]
hide = true
run = "flutter run"

[tasks.dev-windows]
hide = true
run = "flutter run"

[tasks.lint]
run = "trunk check --all"

[tasks.format]
run = "trunk fmt"

[tasks.publish]
description = "Bump version in pubspec.yaml, commit all changes, push to test, and stream the release run"
usage = '''
arg "<version>" help="New version for pubspec.yaml, e.g. 1.1.1+3"
arg "<message>" help="Commit message for the release commit"
'''
run = '''
{%- if os() == "windows" -%}
powershell -NoProfile -Command "$ErrorActionPreference='Stop'; $p='pubspec.yaml'; $raw=Get-Content -Raw $p; $new=[regex]::Replace($raw, '(?m)^version:[^\r\n]*', 'version: '+$env:usage_version); [IO.File]::WriteAllText((Resolve-Path $p).Path, $new, (New-Object Text.UTF8Encoding $false)); git add -A; if($LASTEXITCODE){exit 1}; git commit -m $env:usage_message; if($LASTEXITCODE){exit 1}; git push origin HEAD:test --force-with-lease; if($LASTEXITCODE){exit 1}; if(Get-Command gh -ErrorAction SilentlyContinue){ $sha=(git rev-parse HEAD).Trim(); $id=$null; foreach($i in 1..10){ Start-Sleep -Seconds 3; $id = gh run list --branch test --limit 10 --json databaseId,headSha --jq ('map(select(.headSha==\"'+$sha+'\")) | .[0].databaseId'); if($id){break} }; if($id){ gh run watch $id --exit-status } else { Write-Host 'Release run not found yet; check GitHub Actions manually.' } } else { Write-Host 'gh CLI not found; skipping run watch.' }"
{%- else -%}
grep -qE '^version: ' pubspec.yaml || { echo "pubspec.yaml: no 'version:' line found" >&2; exit 1; }
tmp="$(mktemp)"
sed -E "s|^version: .*|version: ${usage_version}|" pubspec.yaml > "$tmp" && mv "$tmp" pubspec.yaml
git add -A
git commit -m "${usage_message}"
git push origin HEAD:test --force-with-lease

if ! command -v gh >/dev/null 2>&1; then
  echo "gh CLI not found; skipping run watch." >&2
  exit 0
fi

# Match the run by the pushed commit SHA, not just "latest", to avoid
# attaching to an unrelated run. The run can take a few seconds to register.
sha="$(git rev-parse HEAD)"
run_id=""
for _ in $(seq 1 10); do
  sleep 3
  run_id="$(gh run list --branch test --limit 10 --json databaseId,headSha \
    --jq "map(select(.headSha==\"${sha}\")) | .[0].databaseId" 2>/dev/null || true)"
  [ -n "$run_id" ] && break
done

if [ -n "$run_id" ]; then
  gh run watch "$run_id" --exit-status
else
  echo "Release run not found yet; check GitHub Actions manually." >&2
fi
{%- endif -%}
'''
