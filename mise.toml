[settings]
windows_shim_mode = "symlink"
yes = true
experimental = true
auto_install = true
exec_auto_install = true
not_found_auto_install = true
task_run_auto_install = true
lockfile = true
all_compile = false

[settings.status]
missing_tools = "always"

[plugins]
android-sdk = "https://github.com/mise-plugins/mise-android-sdk"

[tools]
flutter = "3.41.9"
yq = { version = "4.53.2", os = ["linux"] }
java = { version = "17.0.2", os = ["linux"] }
clang = { version = "18.1.8", os = ["linux"] }
cmake = { version = "4.3.3" }
ninja = { version = "1.13.2" }
trunk = "1.3.4"

[tools.android-sdk]
version = "20.0"
depends = ["yq", "java", "flutter"]
os = ["linux"]
postinstall = """
    yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses
    yes | sdkmanager --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-36" "build-tools;35.0.0" "ndk;28.2.13676358"
    mise exec flutter -- flutter config --android-sdk "$ANDROID_HOME"
    mise exec flutter -- flutter doctor -v
"""

[hooks]
postinstall = ["flutter pub get", "trunk install"]

[tasks.install]
run = "mise i"

[tasks.build]
description = "Build a target platform"
usage = '''
arg "<target>" help="Build target" {
  choices "apk" "appbundle" "web" "linux" "windows" "macos" "ios"
}
'''
run = ["dart run icons_launcher:create", "mise build-{{ usage.target }}"]

[tasks.build-apk]
hide = true
run = "flutter build apk"

[tasks.build-appbundle]
hide = true
run = "flutter build appbundle"

[tasks.build-web]
hide = true
run = "flutter build web --base-href /knitcalc/"

[tasks.build-linux]
hide = true
run = '''
for library in libfontconfig.so.1 libepoxy.so.0; do
  library_path=""
  for candidate in /nix/store/*/lib/"$library"; do
    if file -L "$candidate" 2>/dev/null | grep -q 'ELF 64-bit.*x86-64'; then
      library_path="$candidate"
      break
    fi
  done
  if [ -n "$library_path" ]; then
    export LD_LIBRARY_PATH="${library_path%/*}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
  fi
done

flutter build linux
'''

[tasks.build-windows]
hide = true
run = "flutter build windows"

[tasks.build-macos]
hide = true
run = "flutter build macos"

[tasks.build-ios]
hide = true
run = "flutter build ios --release --no-codesign"

[tasks.test]
run = ["flutter analyze", "flutter test"]

[tasks.dev]
run = "mise run dev-{{ os() }}"

[tasks.dev-linux]
hide = true
run = '''
for library in libfontconfig.so.1 libepoxy.so.0; do
  library_path=""
  for candidate in /nix/store/*/lib/"$library"; do
    if file -L "$candidate" 2>/dev/null | grep -q 'ELF 64-bit.*x86-64'; then
      library_path="$candidate"
      break
    fi
  done
  if [ -n "$library_path" ]; then
    export LD_LIBRARY_PATH="${library_path%/*}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
  fi
done

flutter run
'''

[tasks.dev-macos]
hide = true
run = "flutter run"

[tasks.dev-windows]
hide = true
run = "flutter run"

[tasks.lint]
run = "trunk check --all"

[tasks.format]
run = "trunk fmt"

[tasks.publish]
run = [
    "test -z \"$(git status --porcelain)\"",
    "git push origin HEAD:test --force-with-lease",
]
